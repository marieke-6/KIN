<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kin — Find your people, nearby.</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <meta name="theme-color" content="#5a8a6a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kin" />
  <link rel="stylesheet" href="src/styles/tokens.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
  <link rel="stylesheet" href="src/styles/responsive.css" />
  <link rel="stylesheet" href="src/styles/business.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <aside id="side-nav">
    <div class="snav-logo">Kin</div>
    <div class="snav-list">
      <button class="snav-item" data-screen="dashboard" onclick="window.kinNavigate('dashboard')">
        <i class="ti ti-home"></i><span>Home</span>
      </button>
      <button class="snav-item" data-screen="explore" onclick="window.kinNavigate('explore')">
        <i class="ti ti-compass"></i><span>Explore</span>
      </button>
      <button class="snav-item" data-screen="recommendations" onclick="window.kinNavigate('recommendations')">
        <i class="ti ti-star"></i><span>Tips</span>
      </button>
      <button class="snav-item" data-screen="stammtisch" onclick="window.kinNavigate('stammtisch')">
        <i class="ti ti-beer"></i><span>Stammtisch</span>
      </button>
      <button class="snav-item" data-screen="profile" onclick="window.kinNavigate('profile')">
        <i class="ti ti-user"></i><span>Profile</span>
      </button>
    </div>
    <div class="snav-divider"></div>
    <div id="snav-user-area"></div>
  </aside>
  <div id="app"></div>

  <!-- iOS "Add to Home Screen" install hint -->
  <div id="pwa-ios-hint" style="display:none;position:fixed;bottom:28px;left:16px;right:16px;z-index:9999;
       background:#1c1c1e;color:#f5f5f5;border-radius:14px;padding:16px 18px 18px;
       font-family:-apple-system,'Helvetica Neue',sans-serif;font-size:14px;line-height:1.5;
       box-shadow:0 8px 32px rgba(0,0,0,0.45);">
    <button onclick="document.getElementById('pwa-ios-hint').style.display='none';localStorage.setItem('kin-ios-hint','1')"
            style="position:absolute;top:10px;right:14px;background:none;border:none;color:#8e8e93;
                   font-size:20px;line-height:1;cursor:pointer;padding:2px 4px;">×</button>
    <p style="margin:0 24px 6px 0;font-weight:600;font-size:15px;">Install Kin on your iPhone</p>
    <p style="margin:0;color:#ebebf5cc;font-size:13px;">
      Tap
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin:0 2px;">
        <path d="M12 3v13"/><path d="m8 7 4-4 4 4"/><rect x="3" y="13" width="18" height="8" rx="2"/>
      </svg>
      <strong style="color:#f5f5f5;">Share</strong> at the bottom of Safari, then tap
      <strong style="color:#f5f5f5;">Add to Home Screen</strong>
    </p>
    <!-- small arrow pointing down toward Safari toolbar -->
    <div style="position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
                width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;
                border-top:9px solid #1c1c1e;"></div>
  </div>
  <script>
    (function() {
      var isIOS = /ipad|iphone|ipod/i.test(navigator.userAgent) && !('MSStream' in window);
      var isStandalone = window.navigator.standalone;
      var dismissed = localStorage.getItem('kin-ios-hint');
      if (isIOS && !isStandalone && !dismissed) {
        setTimeout(function() {
          var el = document.getElementById('pwa-ios-hint');
          if (el) el.style.display = 'block';
        }, 4000);
      }
    })();
  </script>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      console.error('[onerror]', msg, src, line, col, err);
      var app = document.getElementById('app');
      if (app) app.innerHTML = '<main><div style="padding:24px 16px;font-family:sans-serif;"><b>App error</b><pre style="white-space:pre-wrap;font-size:12px;color:red;margin-top:8px;">' + msg + '\n' + src + ':' + line + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;">Reload</button></div></main>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[unhandledrejection]', e.reason);
    });
  </script>
  <script type="module" src="src/main.js?v=20260611c"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
