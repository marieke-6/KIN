<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kin — Find your people, nearby.</title>
  <link rel="stylesheet" href="src/styles/tokens.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <div id="app"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      console.error('[onerror]', msg, src, line, col, err);
      var app = document.getElementById('app');
      if (app) app.innerHTML = '<main><div style="padding:24px 16px;font-family:sans-serif;"><b>App error</b><pre style="white-space:pre-wrap;font-size:12px;color:red;margin-top:8px;">' + msg + '\n' + src + ':' + line + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;">Reload</button></div></main>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[unhandledrejection]', e.reason);
    });
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
