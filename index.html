<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kin — Find your people, nearby.</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <meta name="theme-color" content="#5a8a6a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kin" />
  <link rel="stylesheet" href="src/styles/tokens.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
  <link rel="stylesheet" href="src/styles/responsive.css" />
  <link rel="stylesheet" href="src/styles/business.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <aside id="side-nav">
    <div class="snav-logo">Kin</div>
    <div class="snav-list">
      <button class="snav-item" data-screen="dashboard" onclick="window.kinNavigate('dashboard')">
        <i class="ti ti-home"></i><span>Home</span>
      </button>
      <button class="snav-item" data-screen="explore" onclick="window.kinNavigate('explore')">
        <i class="ti ti-compass"></i><span>Explore</span>
      </button>
      <button class="snav-item" data-screen="recommendations" onclick="window.kinNavigate('recommendations')">
        <i class="ti ti-star"></i><span>Tips</span>
      </button>
      <button class="snav-item" data-screen="stammtisch" onclick="window.kinNavigate('stammtisch')">
        <i class="ti ti-beer"></i><span>Stammtisch</span>
      </button>
      <button class="snav-item" data-screen="profile" onclick="window.kinNavigate('profile')">
        <i class="ti ti-user"></i><span>Profile</span>
      </button>
    </div>
    <div class="snav-divider"></div>
    <div id="snav-user-area"></div>
  </aside>
  <div id="app"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      console.error('[onerror]', msg, src, line, col, err);
      var app = document.getElementById('app');
      if (app) app.innerHTML = '<main><div style="padding:24px 16px;font-family:sans-serif;"><b>App error</b><pre style="white-space:pre-wrap;font-size:12px;color:red;margin-top:8px;">' + msg + '\n' + src + ':' + line + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;">Reload</button></div></main>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[unhandledrejection]', e.reason);
    });
  </script>
  <script type="module" src="src/main.js?v=20260611c"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
